<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>ReadAny Reader</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-text-size-adjust: none;
      -webkit-user-select: text;
      user-select: text;
      background: var(--bg, #1c1c1e);
      color: var(--fg, #e8e8ed);
    }

    #reader-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #pull-bookmark-indicator {
      position: absolute;
      left: 50%;
      top: 0;
      transform: translate(-50%, -12px) scale(0.96);
      opacity: 0;
      pointer-events: none;
      z-index: 30;
      transition: opacity 140ms ease, transform 180ms ease;
    }

    /* While the finger is actively dragging the indicator, kill the transition
       so the pill follows touch instantly. Re-enable on release for the
       spring-back animation. */
    #pull-bookmark-indicator[data-following="true"] {
      transition: none;
    }

    #pull-bookmark-indicator .pill {
      min-width: 164px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(28, 28, 30, 0.88);
      color: #f5f5f7;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      text-align: center;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    #pull-bookmark-indicator[data-armed="true"] .pill {
      background: rgba(59, 130, 246, 0.92);
      color: white;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }

    #loading.hidden {
      display: none;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #loading-text {
      font-size: 14px;
      color: var(--muted, #7c7c82);
    }

    .error-text {
      font-size: 14px;
      color: #e53935;
      text-align: center;
      padding: 20px;
    }

    /* Suppress iOS selection callout */
    * {
      -webkit-touch-callout: none !important;
    }

    ::selection {
      background: rgba(250, 204, 21, 0.4) !important;
    }
  </style>
</head>

<body>
  <div id="reader-container">
    <div id="pull-bookmark-indicator" aria-hidden="true" data-armed="false">
      <div class="pill" id="pull-bookmark-indicator-text"></div>
    </div>
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Loading...</div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════════════
    // ReadAny WebView Reader Bridge
    // Communicates with React Native via postMessage
    // ═══════════════════════════════════════════════════════════════

    const RN = window.ReactNativeWebView;
    function postToRN(type, data) {
      if (RN) RN.postMessage(JSON.stringify({ type, ...data }));
    }

    // State
    let view = null;
    let currentBook = null;
    let searchGenerator = null;
    let searchResults = [];
    let searchIndex = 0;
    let currentSectionIndex = 0;
    let totalSections = 0;
    let currentThemeColors = { bg: '#1c1c1e', fg: '#e8e8ed', muted: '#7c7c82', primary: '#3b82f6' };
    let lastRendererStyles = '';
    let currentViewMode = 'paginated';
    let currentPaginatedLayout = 'double';
    let currentFontSize = 16;
    let currentLineHeight = 1.6;
    let currentParagraphSpacing = 8;
    let currentFontTheme = 'default';
    let currentCustomFontFaceCSS = '';
    let currentCustomFontFamily = '';
    let tapNavigationInFlight = false;
    let tapNavigationResetTimer = null;
    let readerElement = null;
    let bookTextMetricsJobId = 0;
    let bookTextMetricsTimer = null;
    let bookmarkPullGestureActive = false;
    let pullBookmarkResetTimer = null;
    let refreshAnnotationsTimer = null;
    let bookmarkPullStateMeta = {
      bookmarked: false,
      pullToAdd: '下滑添加书签',
      releaseToAdd: '松手添加书签',
      pullToRemove: '下滑删除书签',
      releaseToRemove: '松手删除书签',
    };

    // Store user annotations for re-rendering on page change
    const userAnnotations = new Map();
    const TTS_HIGHLIGHT_KEY = 'readany-tts-highlight';
    const TTS_ANNOTATION_PREFIX = 'foliate-tts:';
    let ttsHighlightState = {
      cfi: null,
      color: null,
      annotationValue: null,
    };

    function emitTTSDebug(message, detail) {
      try {
        postToRN('debug', {
          message: detail
            ? `[ttsHighlight] ${message} ${JSON.stringify(detail)}`
            : `[ttsHighlight] ${message}`,
        });
      } catch {}
    }

    function clearTapNavigationLock() {
      tapNavigationInFlight = false;
      if (tapNavigationResetTimer) {
        clearTimeout(tapNavigationResetTimer);
        tapNavigationResetTimer = null;
      }
    }

    function armTapNavigationLock() {
      tapNavigationInFlight = true;
      if (tapNavigationResetTimer) clearTimeout(tapNavigationResetTimer);
      tapNavigationResetTimer = setTimeout(() => {
        clearTapNavigationLock();
      }, 220);
    }

    function refreshUserAnnotations(delay) {
      if (!view) return;
      if (refreshAnnotationsTimer) clearTimeout(refreshAnnotationsTimer);
      refreshAnnotationsTimer = setTimeout(() => {
        refreshAnnotationsTimer = null;
        if (!view) return;

        for (const [, annotation] of userAnnotations) {
          view.addAnnotation(annotation).catch(() => {
            // Ignore annotations outside the currently rendered section.
          });
        }

        if (ttsHighlightState.cfi) {
          setTTSHighlight(ttsHighlightState.cfi, ttsHighlightState.color);
        }
      }, delay == null ? 100 : delay);
    }

    function applyFixedLayoutRendererSettings(renderer, paginatedLayout) {
      if (!renderer) return;
      const layout = paginatedLayout === 'single' ? 'single' : 'double';
      const spreadMode = layout === 'single' ? 'none' : 'auto';
      const zoomMode = layout === 'single' ? 'fit-width' : 'fit-page';

      renderer.setAttribute('spread', spreadMode);
      renderer.setAttribute('zoom', zoomMode);

      const host = renderer.closest && renderer.closest('foliate-view');
      if (host && host.book && host.book.rendition) {
        host.book.rendition.spread = spreadMode;
      }
    }

    function getPullBookmarkElements() {
      return {
        indicator: document.getElementById('pull-bookmark-indicator'),
        text: document.getElementById('pull-bookmark-indicator-text'),
      };
    }

    function getPullBookmarkLabel(armed) {
      if (bookmarkPullStateMeta.bookmarked) {
        return armed ? bookmarkPullStateMeta.releaseToRemove : bookmarkPullStateMeta.pullToRemove;
      }
      return armed ? bookmarkPullStateMeta.releaseToAdd : bookmarkPullStateMeta.pullToAdd;
    }

    function setReaderTranslateY(offset, animated) {
      return;
    }

    function updatePullBookmarkUI(offset, armed) {
      const { indicator, text } = getPullBookmarkElements();
      const pullOffset = Math.max(0, Math.min(offset, 72));
      const easedOffset = Math.round(Math.min(58, pullOffset * 0.78));
      bookmarkPullGestureActive = pullOffset > 0;
      if (text) text.textContent = getPullBookmarkLabel(armed);
      if (indicator) {
        indicator.dataset.following = 'true';
        indicator.dataset.armed = armed ? 'true' : 'false';
        indicator.style.opacity = String(Math.min(1, pullOffset / 18));
        indicator.style.transform =
          `translate(-50%, ${Math.min(24, -12 + easedOffset * 0.68)}px) scale(${0.96 + Math.min(0.08, pullOffset / 360)})`;
      }
      setReaderTranslateY(easedOffset, false);
      postToRN('bookmarkPull', { offset: easedOffset, armed, active: pullOffset > 0 });
    }

    function resetPullBookmarkUI(animated) {
      const { indicator, text } = getPullBookmarkElements();
      bookmarkPullGestureActive = false;
      if (text) text.textContent = getPullBookmarkLabel(false);
      if (indicator) {
        indicator.dataset.following = 'false';
        indicator.dataset.armed = 'false';
        indicator.style.opacity = '0';
        indicator.style.transform = 'translate(-50%, -12px) scale(0.96)';
      }
      setReaderTranslateY(0, animated !== false);
      postToRN('bookmarkPull', { offset: 0, armed: false, active: false });
    }

    function getRendererContents() {
      if (!view || !view.renderer || !view.renderer.getContents) return [];
      const contents = view.renderer.getContents();
      if (!contents || !contents.length) return [];
      const unique = [];
      for (const content of contents) {
        if (!content || !content.doc || content.index == null) continue;
        const exists = unique.some(
          (item) => item.doc === content.doc && item.index === content.index
        );
        if (exists) continue;
        unique.push(content);
      }
      return unique;
    }

    function getRendererContentForDoc(doc) {
      if (!doc) return null;
      const contents = getRendererContents();
      return contents.find((content) => content.doc === doc) || null;
    }

    function getRendererContentForCfi(cfi) {
      const contents = getRendererContents();
      if (!contents.length) return null;
      if (!cfi || !view || !view.resolveCFI) {
        return contents.find((content) => content.overlayer) || contents[0] || null;
      }

      try {
        const resolved = view.resolveCFI(cfi);
        if (resolved && resolved.index != null) {
          const byIndex = contents.find((content) => content.index === resolved.index && content.overlayer);
          if (byIndex) return byIndex;
        }
        if (resolved && typeof resolved.anchor === 'function') {
          for (const content of contents) {
            try {
              const anchored = resolved.anchor(content.doc);
              if (anchored) return content;
            } catch {}
          }
        }
      } catch (e) {
        console.log('[ttsHighlight] failed to resolve content for cfi:', e);
      }

      return contents.find((content) => content.overlayer) || contents[0] || null;
    }

    function getAllTTSOverlayerContexts() {
      return getRendererContents().filter((content) => content.overlayer);
    }

    function removeAllTTSHighlights() {
      const contexts = getAllTTSOverlayerContexts();
      for (const context of contexts) {
        try {
          context.overlayer.remove(TTS_HIGHLIGHT_KEY);
        } catch {}
      }
    }

    function getCurrentTTSOverlayerContext() {
      return getAllTTSOverlayerContexts()[0] || null;
    }

    async function ensureTTSEngine() {
      const current = getCurrentTTSOverlayerContext();
      if (!view || !current || !current.doc) return null;

      try {
        await view.initTTS('sentence', (range) => {
          const sourceDoc = range && range.startContainer
            ? (range.startContainer.nodeType === Node.DOCUMENT_NODE
                ? range.startContainer
                : range.startContainer.ownerDocument)
            : null;
          const source = getRendererContentForDoc(sourceDoc) || getCurrentTTSOverlayerContext();
          if (!source || !source.overlayer || !source.doc || source.index == null) return null;

          let cfi = null;
          try {
            cfi = view.getCFI ? view.getCFI(source.index, range.cloneRange()) : null;
          } catch (e) {
            console.log('[ttsHighlight] failed to convert highlighted range to CFI:', e);
          }

          const target = cfi ? getRendererContentForCfi(cfi) : source;
          let renderRange = range;
          if (cfi && view.resolveCFI && target && target.doc) {
            try {
              const resolved = view.resolveCFI(cfi);
              const anchoredRange = resolved?.anchor?.(target.doc);
              if (anchoredRange) renderRange = anchoredRange;
            } catch (e) {
              console.log('[ttsHighlight] failed to resolve highlighted CFI:', e);
            }
          }

          removeAllTTSHighlights();

          try {
            (target || source).overlayer.add(
              TTS_HIGHLIGHT_KEY,
              renderRange,
              Overlayer.highlight,
              { color: resolveTTSHighlightColor(ttsHighlightState.color) }
            );
          } catch (e) {
            console.log('[ttsHighlight] error drawing active TTS highlight:', e);
          }

          return cfi;
        });
        return view.tts || null;
      } catch (e) {
        console.log('[ttsHighlight] failed to initialize TTS engine:', e);
        return null;
      }
    }

    function drawTTSHighlight(rects, options) {
      const { color = 'rgba(96, 165, 250, 0.35)', padding = 1, radius = 4, radiusPadding = 2 } = options || {};
      const svgNS = 'http://www.w3.org/2000/svg';
      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('fill', color);
      g.style.opacity = 'var(--overlayer-highlight-opacity, 1)';
      g.style.mixBlendMode = 'var(--overlayer-highlight-blend-mode, normal)';

      for (let index = 0; index < rects.length; index++) {
        const { left, top, width, height } = rects[index];
        const isFirst = index === 0;
        const isLast = index === rects.length - 1;
        const x = left - padding - (isFirst ? radiusPadding : 0);
        const y = top - padding;
        const w = width + padding * 2 + (isFirst ? radiusPadding : 0) + (isLast ? radiusPadding : 0);
        const h = height + padding * 2;
        const rtl = isLast ? radius : 0;
        const rtr = isFirst ? radius : 0;
        const rbr = isFirst ? radius : 0;
        const rbl = isLast ? radius : 0;
        const path = document.createElementNS(svgNS, 'path');
        path.setAttribute(
          'd',
          [
            `M ${x + rtl} ${y}`,
            `H ${x + w - rtr}`,
            rtr ? `Q ${x + w} ${y} ${x + w} ${y + rtr}` : '',
            `V ${y + h - rbr}`,
            rbr ? `Q ${x + w} ${y + h} ${x + w - rbr} ${y + h}` : '',
            `H ${x + rbl}`,
            rbl ? `Q ${x} ${y + h} ${x} ${y + h - rbl}` : '',
            `V ${y + rtl}`,
            rtl ? `Q ${x} ${y} ${x + rtl} ${y}` : '',
            'Z',
          ].filter(Boolean).join(' ')
        );
        g.append(path);
      }

      return g;
    }

    function resolveTTSHighlightColor(color) {
      if (!color) return 'rgba(96, 165, 250, 0.35)';
      // If it's already an rgba/rgb value, use as-is
      if (color.startsWith('rgba(') || color.startsWith('rgb(')) return color;
      // If it's a plain hex color, apply 35% opacity for a soft blue-tinted highlight
      if (/^#[0-9a-fA-F]{3,8}$/.test(color)) {
        const r = parseInt(color.slice(1, 3), 16);
        const g = parseInt(color.slice(3, 5), 16);
        const b = parseInt(color.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, 0.35)`;
      }
      return color;
    }

    function clearTTSHighlight() {
      const previousValue = ttsHighlightState.annotationValue;
      if (!previousValue && !ttsHighlightState.cfi) return;
      ttsHighlightState = { cfi: null, color: null, annotationValue: null };
      removeAllTTSHighlights();
      if (view && previousValue) {
        try {
          view.deleteAnnotation({ value: previousValue, type: 'tts-highlight' });
        } catch (e) {}
      }
    }

    function countReadableCharacters(doc) {
      const rawText = doc && doc.body && typeof doc.body.textContent === 'string'
        ? doc.body.textContent
        : '';
      return rawText.replace(/\s+/g, '').length;
    }

    async function computeBookTextMetrics(book, jobId) {
      if (!book || !book.sections || !book.sections.length) return 0;
      let totalCharacters = 0;

      for (let index = 0; index < book.sections.length; index++) {
        if (jobId !== bookTextMetricsJobId || currentBook !== book) return 0;
        const section = book.sections[index];
        if (!section || !section.createDocument) continue;
        try {
          const doc = await section.createDocument();
          const sectionCharacters = countReadableCharacters(doc);
          if (sectionCharacters > 0) {
            totalCharacters += sectionCharacters;
          }
        } catch (error) {
          console.warn('[WebView] Failed to measure section characters:', section && section.href, error);
        }

        if (index > 0 && index % 3 === 0) {
          await new Promise((resolve) => setTimeout(resolve, 0));
        }
      }

      return totalCharacters;
    }

    function scheduleBookTextMetrics(book) {
      if (bookTextMetricsTimer) {
        clearTimeout(bookTextMetricsTimer);
        bookTextMetricsTimer = null;
      }

      const jobId = ++bookTextMetricsJobId;
      bookTextMetricsTimer = setTimeout(async () => {
        bookTextMetricsTimer = null;
        const totalCharacters = await computeBookTextMetrics(book, jobId);
        if (jobId !== bookTextMetricsJobId || currentBook !== book) return;
        if (totalCharacters > 0) {
          postToRN('bookTextMetrics', { totalCharacters });
        }
      }, 900);
    }

    async function followTTSLocation(cfi) {
      if (!view || !view.renderer || !cfi) return;
      const resolved = resolveRangeForCfi(cfi);
      if (!resolved) {
        try {
          await view.goTo(cfi);
        } catch (e) {}
        return;
      }

      const { range, doc, index } = resolved;
      const contents = getRendererContents();
      const current = contents[0] || null;
      const currentIndex = current && current.index != null ? current.index : null;

      if (currentIndex != null && index !== currentIndex) {
        try {
          await view.goTo(cfi);
        } catch (e) {}
        return;
      }

      const renderer = view.renderer;
      const win = doc.defaultView;
      if (!win) return;
      if (!isRangeVisibleInReader(range, renderer, win)) {
        try {
          await renderer.scrollToAnchor(range, true);
        } catch (e) {
          try {
            await view.goTo(cfi);
          } catch (_) {}
        }
      }
    }

    async function setTTSHighlight(cfi, color) {
      postToRN('debug', { message: '[ttsHighlight] setTTSHighlight called: cfi=' + (cfi || 'null') + ' color=' + (color || 'null') });
      const previousValue = ttsHighlightState.annotationValue;
      const annotationValue = cfi ? `${TTS_ANNOTATION_PREFIX}${cfi}` : null;
      const normalizedColor = color || null;
      if (
        ttsHighlightState.annotationValue === annotationValue &&
        ttsHighlightState.color === normalizedColor
      ) {
        return;
      }
      ttsHighlightState = {
        cfi: cfi || null,
        color: normalizedColor,
        annotationValue,
      };
      if (!view) {
        postToRN('debug', { message: '[ttsHighlight] no view, aborting' });
        return;
      }

      // Remove previous TTS highlight annotation
      if (previousValue) {
        try {
          await view.deleteAnnotation({ value: previousValue, type: 'tts-highlight' });
        } catch (e) {
          postToRN('debug', { message: '[ttsHighlight] delete error: ' + String(e) });
        }
      }
      removeAllTTSHighlights();

      if (!cfi) return;

      // Only draw the active TTS highlight here.
      // Reader-level sentence following is controlled in React so this layer
      // does not accidentally trigger extra relocates while simply repainting.
      try {
        await view.addAnnotation({
          value: annotationValue,
          type: 'tts-highlight',
          color: color || null,
        });
        postToRN('debug', { message: '[ttsHighlight] addAnnotation success for: ' + cfi.slice(0, 40) });
      } catch (e) {
        postToRN('debug', { message: '[ttsHighlight] addAnnotation error: ' + String(e) });
      }
    }

    // Note tooltip registry: per-doc WeakMap of cfi -> { range, note }
    const docNoteRegistries = new WeakMap();

    function registerNoteRange(doc, cfi, range, note) {
      let registry = docNoteRegistries.get(doc);
      if (!registry) {
        registry = new Map();
        docNoteRegistries.set(doc, registry);
      }
      registry.set(cfi, { range, note });
    }

    function unregisterNoteRange(doc, cfi) {
      const registry = docNoteRegistries.get(doc);
      if (registry) registry.delete(cfi);
    }

    function isPointInNoteRange(doc, x, y) {
      const registry = docNoteRegistries.get(doc);
      if (!registry || registry.size === 0) return null;
      const pad = 6;
      for (const [cfi, entry] of registry) {
        for (const rect of entry.range.getClientRects()) {
          if (x >= rect.left - pad && x <= rect.right + pad &&
              y >= rect.top - pad && y <= rect.bottom + pad + 4) {
            return { cfi, note: entry.note, range: entry.range };
          }
        }
      }
      return null;
    }

    function armNoteTapGuard(doc, duration = 750) {
      if (!doc) return;
      doc.__readany_noteTapGuardUntil = Date.now() + duration;
    }

    function isNoteTapGuardActive(doc) {
      return !!doc?.__readany_noteTapGuardUntil && doc.__readany_noteTapGuardUntil > Date.now();
    }

    // Attach long-press note tooltip detection to each doc
    function attachNoteLongPress(doc) {
      if (doc.__readany_noteLongPress) return;
      doc.__readany_noteLongPress = true;

      const LONG_PRESS_MS = 400;
      let timer = null;
      let startX = 0, startY = 0;

      doc.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];
        startX = touch.clientX;
        startY = touch.clientY;

        timer = setTimeout(() => {
          timer = null;
          const hit = isPointInNoteRange(doc, startX, startY);
          if (!hit) return;
          armNoteTapGuard(doc, 900);

          // Prevent subsequent click / show-annotation
          e.preventDefault && e.preventDefault();

          const rect = hit.range.getBoundingClientRect();
          const iframe = doc.defaultView && doc.defaultView.frameElement;
          const iframeRect = iframe ? iframe.getBoundingClientRect() : { left: 0, top: 0 };
          postToRN('note-tooltip', {
            cfi: hit.cfi,
            note: hit.note,
            position: {
              x: iframeRect.left + rect.left + rect.width / 2,
              y: iframeRect.top + rect.top - 8,
              selectionTop: iframeRect.top + rect.top,
              selectionBottom: iframeRect.top + rect.bottom,
            },
          });
        }, LONG_PRESS_MS);
      }, { passive: false });

      doc.addEventListener('touchmove', (e) => {
        if (!timer) return;
        const touch = e.touches[0];
        if (Math.abs(touch.clientX - startX) > 10 || Math.abs(touch.clientY - startY) > 10) {
          clearTimeout(timer);
          timer = null;
        }
      }, { passive: true });

      doc.addEventListener('touchend', () => {
        if (timer) { clearTimeout(timer); timer = null; }
      }, { passive: true });

      doc.addEventListener('touchcancel', () => {
        if (timer) { clearTimeout(timer); timer = null; }
      }, { passive: true });
    }

    // ─── Message handler from React Native ───
    window.addEventListener('message', async (e) => {
      try {
        const msg = JSON.parse(e.data);
        await handleCommand(msg);
      } catch (err) {
        console.error('[WebView] Error in message handler:', err);
        postToRN('error', { message: String(err) });
      }
    });

    document.addEventListener('message', async (e) => {
      try {
        const msg = JSON.parse(e.data);
        await handleCommand(msg);
      } catch (err) {
        console.error('[WebView] Error in iOS message handler:', err);
        postToRN('error', { message: String(err) });
      }
    });

    async function handleCommand(msg) {
      switch (msg.type) {
        case 'openBook':
          await openBook(msg);
          break;
        case 'goNext':
          if (view) await view.next();
          break;
        case 'goPrev':
          if (view) await view.prev();
          break;
        case 'goToFraction':
          if (view && msg.fraction != null) await view.goToFraction(msg.fraction);
          break;
        case 'goToHref':
          if (view && msg.href) await view.goTo(msg.href);
          break;
        case 'goToCFI':
          if (view && msg.cfi) await view.goTo(msg.cfi);
          break;
        case 'search':
          await handleSearch(msg.query);
          break;
        case 'clearSearch':
          if (view) view.clearSearch();
          searchResults = [];
          searchIndex = 0;
          break;
        case 'navigateSearch':
          if (msg.index != null) navigateToSearchResult(msg.index);
          break;
        case 'addAnnotation':
          if (view && msg.annotation) {
            if (
              msg.annotation.type === 'tts-highlight' ||
              (msg.annotation.value && msg.annotation.value.startsWith(TTS_ANNOTATION_PREFIX))
            ) {
              postToRN('debug', {
                message: `[ttsHighlight] addAnnotation command ${JSON.stringify({
                  value: msg.annotation.value,
                  type: msg.annotation.type,
                  color: msg.annotation.color,
                })}`,
              });
            }
            // Don't store flash highlights in userAnnotations
            if (
              !msg.annotation.flash &&
              !(msg.annotation.value && msg.annotation.value.startsWith('flash-')) &&
              msg.annotation.type !== 'tts-highlight' &&
              !(msg.annotation.value && msg.annotation.value.startsWith(TTS_ANNOTATION_PREFIX))
            ) {
              userAnnotations.set(msg.annotation.value, msg.annotation);
            }
            await view.addAnnotation(msg.annotation);
          }
          break;
        case 'removeAnnotation':
          if (view && msg.annotation) {
            if (
              msg.annotation.type === 'tts-highlight' ||
              (msg.annotation.value && msg.annotation.value.startsWith(TTS_ANNOTATION_PREFIX))
            ) {
              postToRN('debug', {
                message: `[ttsHighlight] removeAnnotation command ${JSON.stringify({
                  value: msg.annotation.value,
                  type: msg.annotation.type,
                })}`,
              });
            }
            await view.deleteAnnotation(msg.annotation);
            // Don't delete from userAnnotations if it's a flash highlight
            if (
              !msg.annotation.flash &&
              !(msg.annotation.value && msg.annotation.value.startsWith('flash-')) &&
              msg.annotation.type !== 'tts-highlight' &&
              !(msg.annotation.value && msg.annotation.value.startsWith(TTS_ANNOTATION_PREFIX))
            ) {
              userAnnotations.delete(msg.annotation.value);
            }
          }
          break;
        case 'applySettings':
          if (view && msg.settings) applySettings(msg.settings);
          break;
        case 'setTTSHighlight':
          await setTTSHighlight(msg.cfi, msg.color);
          break;
        case 'clearTTSHighlight':
          await clearTTSHighlight();
          break;
        case 'setThemeColors':
          if (msg.colors) setThemeColors(msg.colors);
          break;
        case 'extractChapters':
          await handleExtractChapters();
          break;
        case 'getChapterParagraphs':
          handleGetChapterParagraphs();
          break;
        case 'getTTSSegmentContext':
          await ensureTTSEngine();
          postToRN('ttsSegmentContext', getTTSSegmentContextFromEngine(msg.cfi, msg.before, msg.after));
          break;
        case 'injectChapterTranslations':
          await handleInjectChapterTranslations(msg.results || [], msg.visibility);
          break;
        case 'removeChapterTranslations':
          handleRemoveChapterTranslations();
          break;
      }
    }

    // ─── Book loading ───
    async function openBook(msg) {
      const container = document.getElementById('reader-container');
      const loading = document.getElementById('loading');
      bookTextMetricsJobId += 1;
      if (bookTextMetricsTimer) {
        clearTimeout(bookTextMetricsTimer);
        bookTextMetricsTimer = null;
      }

      try {
        let hasSignalledLoaded = false;
        const markLoaded = () => {
          if (loading) loading.classList.add('hidden');
          if (!hasSignalledLoaded) {
            hasSignalledLoaded = true;
            postToRN('loaded', {});
          }
        };

        let file;
        if (msg.base64) {
          const binary = atob(msg.base64);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
          file = new File([bytes], msg.fileName || 'book.epub', {
            type: msg.mimeType || 'application/epub+zip'
          });
        } else if (msg.uri) {
          // Try Range-based lazy loading for ZIP-based formats (EPUB, CBZ, FBZ)
          // This avoids loading the entire file into memory — only reads
          // the ZIP central directory (~few KB) then fetches entries on demand.
          const isZipFormat = /\.(epub|cbz|fb2\.zip|fbz)$/i.test(msg.fileName || '');
          let lazyBook = null;

          if (isZipFormat) {
            try {
              // HEAD request to get file size and check Range support
              const headRes = await fetch(msg.uri, { method: 'HEAD' });
              const acceptRanges = headRes.headers.get('Accept-Ranges');
              const contentLength = parseInt(headRes.headers.get('Content-Length'), 10);

              if (acceptRanges === 'bytes' && contentLength > 0) {
                // Create a HttpRangeReader compatible with zip.js's ZipReader
                const bookUri = msg.uri;
                const rangeReader = {
                  size: contentLength,
                  async readUint8Array(offset, length) {
                    const end = Math.min(offset + length - 1, contentLength - 1);
                    const res = await fetch(bookUri, {
                      headers: { 'Range': `bytes=${offset}-${end}` }
                    });
                    if (!res.ok && res.status !== 206) {
                      throw new Error(`Range request failed: ${res.status}`);
                    }
                    return new Uint8Array(await res.arrayBuffer());
                  }
                };

                // Use zip.js and EPUB from the bundled globals
                const { configure, ZipReader, TextWriter, BlobWriter } = window._zipJs;
                configure({ useWebWorkers: false });
                const zipReader = new ZipReader(rangeReader);
                const entries = await zipReader.getEntries();
                const map = new Map(entries.map(entry => [entry.filename, entry]));

                const load = (f) => (name, ...args) =>
                  map.has(name) ? f(map.get(name), ...args) : null;
                const loadText = load(entry => entry.getData(new TextWriter()));
                const loadBlob = load((entry, type) => entry.getData(new BlobWriter(type)));
                const getSize = (name) => map.get(name)?.uncompressedSize ?? 0;
                const loader = { entries, loadText, loadBlob, getSize };

                // Initialize EPUB from lazy loader
                const EPUB = window._EPUB;
                lazyBook = await new EPUB(loader).init();
              }
            } catch (lazyErr) {
              console.warn('[Reader] Lazy loading failed, falling back to full fetch:', lazyErr);
              lazyBook = null;
            }
          }

          // Try Range-based lazy loading for PDF
          // pdf.js natively supports Range requests via url + disableAutoFetch
          if (!lazyBook && /\.pdf$/i.test(msg.fileName || '')) {
            try {
              const headRes = await fetch(msg.uri, { method: 'HEAD' });
              const acceptRanges = headRes.headers.get('Accept-Ranges');
              const contentLength = parseInt(headRes.headers.get('Content-Length'), 10);

              if (acceptRanges === 'bytes' && contentLength > 0 && window._makePDFFromURL) {
                lazyBook = await window._makePDFFromURL(msg.uri, msg.fileName || 'book.pdf');
              }
            } catch (pdfLazyErr) {
              console.warn('[Reader] PDF lazy loading failed, falling back to full fetch:', pdfLazyErr);
              lazyBook = null;
            }
          }

          if (!lazyBook) {
            const res = await fetch(msg.uri);
            const isLocalFileStatus = res.status === 0 && /^file:\/\//i.test(msg.uri);
            if (!res.ok && !isLocalFileStatus) throw new Error(`Failed to fetch: ${res.status}`);
            const blob = await res.blob();
            file = new File([blob], msg.fileName || 'book.epub', {
              type: msg.mimeType || blob.type || 'application/octet-stream'
            });
          } else {
            // Skip makeBook below — we already have the book object
            file = lazyBook;
          }
        } else {
          throw new Error('No book data provided');
        }

        const book = (file && file.sections) ? file : await makeBook(file);
        currentBook = book;

        const el = document.createElement('foliate-view');
        readerElement = el;
        el.style.width = '100%';
        el.style.height = '100%';
        resetPullBookmarkUI(false);

        el.addEventListener('load', (e) => {
          const { doc, index } = e.detail;
          markLoaded();
          applyDocStyles(doc);
          attachTapListener(doc);
          attachPullBookmarkListener(doc);
          attachSelectionListener(doc);
          attachNoteLongPress(doc);
          attachContinuousScrollListener(doc);
          refreshUserAnnotations(100);
          // Auto-inject ruby annotations if enabled
          if (_rubyMode && (_rubyWordDict || _rubyCharDict)) {
            try { doInjectRubyAnnotations(doc, _rubyMode); } catch(e) {}
          }
        });

        var snippetTimer = null;
        el.addEventListener('relocate', (e) => {
          markLoaded();
          const detail = e.detail;
          const previousSectionIndex = currentSectionIndex;
          if (tapNavigationInFlight) {
            setTimeout(() => {
              clearTapNavigationLock();
            }, 80);
          }
          let relocatedSectionTotal = totalSections;
          if (detail.section != null) {
            currentSectionIndex = typeof detail.section === 'number'
              ? detail.section
              : detail.section.current;
            if (typeof detail.section === 'object' && detail.section.total != null) {
              relocatedSectionTotal = detail.section.total;
            }
          } else if (typeof detail.index === 'number') {
            currentSectionIndex = detail.index;
          }
          const rendererPage = view && view.renderer && typeof view.renderer.page === 'number'
            ? view.renderer.page
            : null;
          const rendererPages = view && view.renderer && typeof view.renderer.pages === 'number'
            ? view.renderer.pages
            : null;
          const actualPage = rendererPage != null && rendererPages != null && rendererPages > 2
            ? {
                current: Math.max(1, Math.min(rendererPage, rendererPages - 2)),
                total: Math.max(1, rendererPages - 2),
              }
            : null;
          postToRN('relocate', {
            fraction: detail.fraction,
            section: { current: currentSectionIndex, total: relocatedSectionTotal },
            location: detail.location,
            page: actualPage,
            tocItem: detail.tocItem,
            pageItem: detail.pageItem,
            cfi: detail.cfi,
          });
          if (currentSectionIndex !== previousSectionIndex) {
            refreshUserAnnotations(120);
          }
          // Extract text after page render settles
          if (snippetTimer) clearTimeout(snippetTimer);
          snippetTimer = setTimeout(() => {
            var snippet = getVisibleTextSnippet(80);
            if (snippet) postToRN('pageSnippet', { textSnippet: snippet });
          }, 300);
        });

        el.addEventListener('draw-annotation', (e) => {
          const { draw, annotation, doc, range } = e.detail;
          if (!draw || !annotation) return;
          console.log('[draw-annotation] annotation:', JSON.stringify(annotation));
          const color = annotation.color || 'yellow';
          const colorMap = {
            red: 'rgba(248, 113, 113, 0.4)',
            yellow: 'rgba(250, 204, 21, 0.4)',
            green: 'rgba(74, 222, 128, 0.4)',
            blue: 'rgba(96, 165, 250, 0.4)',
            pink: 'rgba(236, 72, 153, 0.4)',
            violet: 'rgba(167, 139, 250, 0.4)',
            orange: 'rgba(251, 146, 60, 0.5)',
          };
          
          if (annotation.type === 'tts-highlight') {
            postToRN('debug', {
              message: `[ttsHighlight] draw-annotation ${JSON.stringify({
                value: annotation.value,
                hasRange: !!range,
                text: range && typeof range.toString === 'function' ? range.toString().slice(0, 48) : '',
              })}`,
            });
            draw(Overlayer.highlight, { color: resolveTTSHighlightColor(annotation.color) });
            draw(drawTTSHighlight, { color: resolveTTSHighlightColor(annotation.color) });
          } else if (annotation.note) {
            console.log('[draw-annotation] has note:', annotation.note);
            // Draw both highlight and squiggly underline for notes
            draw(Overlayer.highlight, { color: colorMap[color] || colorMap.yellow });
            draw(Overlayer.squiggly, { color: '#000000', width: 1.5 });
            // Register for long-press tooltip
            if (doc && range && annotation.value) {
              registerNoteRange(doc, annotation.value, range, annotation.note);
              console.log('[draw-annotation] registered note range for:', annotation.value);
            }
          } else {
            draw(Overlayer.highlight, { color: colorMap[color] || colorMap.yellow });
            // Remove stale tooltip registration if note was removed
            if (doc && annotation.value) {
              unregisterNoteRange(doc, annotation.value);
            }
          }
        });

        el.addEventListener('delete-annotation', () => { /* no-op */ });

        el.addEventListener('show-annotation', (e) => {
          const { value, index, range } = e.detail;
          if (!value || !range) return;
          armNoteTapGuard(range.startContainer.ownerDocument, 900);
          const rect = range.getBoundingClientRect();
          const iframe = range.startContainer.ownerDocument?.defaultView?.frameElement;
          const iframeRect = iframe ? iframe.getBoundingClientRect() : { left: 0, top: 0 };
          postToRN('show-annotation', {
            value,
            position: {
              x: iframeRect.left + rect.left + rect.width / 2,
              y: iframeRect.top + rect.top - 8,
              selectionTop: iframeRect.top + rect.top,
              selectionBottom: iframeRect.top + rect.bottom,
            },
          });
        });

        container.appendChild(el);
        view = el;

        await el.open(book);

        if (book.sections) {
          totalSections = book.sections.length;
        } else if (book.toc) {
          totalSections = book.toc.length;
        }

        // Set search indicator color (use primary theme color instead of red)
        if (el.setSearchIndicator) {
          const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary')?.trim() || '#3b82f6';
          el.setSearchIndicator('outline', { color: primaryColor });
        }

        if (book.toc) {
          postToRN('toc', { items: convertTOC(book.toc) });
        }

        const renderer = el.renderer;
        if (renderer && !el.isFixedLayout) {
          renderer.setAttribute('max-column-count', '1');
          renderer.setAttribute('max-block-size', '100%');
          renderer.setAttribute('max-inline-size', '100%');
          // Disable page turn animation for instant response
          // renderer.setAttribute('animated', '');
          // Default gap/margin
          const margin = msg.pageMargin || 16;
          const gapPercent = Math.max(1, Math.round((margin / 393) * 100));
          renderer.setAttribute('gap', gapPercent + '%');
          renderer.setAttribute('margin', margin + 'px');
        } else if (renderer && el.isFixedLayout) {
          const paginatedLayout =
            msg.paginatedLayout === 'single' || msg.paginatedLayout === 'double'
              ? msg.paginatedLayout
              : currentPaginatedLayout;
          currentPaginatedLayout = paginatedLayout;
          applyFixedLayoutRendererSettings(renderer, currentPaginatedLayout);
        }

        if (msg.lastLocation) {
          try {
            await el.init({ lastLocation: msg.lastLocation });
          } catch (err) {
            console.warn('[WebView] Failed to init with lastLocation, going to start:', err);
            await el.goToFraction(0);
          }
        } else {
          await el.goToFraction(0);
        }

        scheduleBookTextMetrics(book);

      } catch (err) {
        console.error('[WebView] Error in openBook:', err);
        loading.innerHTML = '<div class="error-text">' + escapeHtml(String(err)) + '</div>';
        postToRN('error', { message: String(err) });
      }
    }

    // ─── Search ───
    async function handleSearch(query) {
      if (!view || !query) return;
      searchResults = [];
      searchIndex = 0;

      try {
        const iter = view.search({ query });
        let totalResults = 0;
        for await (const result of iter) {
          if (result === 'done') break;
          if (result.subitems) {
            totalResults += result.subitems.length;
            for (const sub of result.subitems) {
              searchResults.push(sub);
            }
          } else if (result.cfi) {
            totalResults++;
            searchResults.push(result);
          }
          if (result.progress != null) {
            postToRN('searchProgress', { progress: result.progress });
          }
        }
        postToRN('searchComplete', { count: totalResults });
        // Navigate to first result
        if (searchResults.length > 0) {
          await view.goTo(searchResults[0].cfi);
          postToRN('searchResult', { index: 0, count: totalResults });
        }
      } catch (err) {
        postToRN('error', { message: 'Search failed: ' + String(err) });
      }
    }

    async function navigateToSearchResult(index) {
      if (index < 0 || index >= searchResults.length) return;
      searchIndex = index;
      try {
        await view.goTo(searchResults[index].cfi);
        postToRN('searchResult', { index, count: searchResults.length });
      } catch (err) {
        postToRN('error', { message: 'Navigate search failed: ' + String(err) });
      }
    }

    // ─── Settings ───
    function applySettings(settings) {
      if (!view || !view.renderer) return;
      const renderer = view.renderer;

      // Update custom font state
      if (settings.customFontFaceCSS !== undefined) {
        currentCustomFontFaceCSS = settings.customFontFaceCSS || '';
        injectCustomFontFace(currentCustomFontFaceCSS);
      }
      if (settings.customFontFamily !== undefined) {
        currentCustomFontFamily = settings.customFontFamily || '';
      }

      if (settings.fontSize !== undefined) {
        currentFontSize = settings.fontSize;
      }
      if (settings.lineHeight !== undefined) {
        currentLineHeight = settings.lineHeight;
      }
      if (settings.paragraphSpacing !== undefined) {
        currentParagraphSpacing = settings.paragraphSpacing;
      }
      if (settings.fontTheme !== undefined) {
        currentFontTheme = settings.fontTheme || 'default';
      }
      if (settings.paginatedLayout !== undefined) {
        currentPaginatedLayout =
          settings.paginatedLayout === 'single' ? 'single' : 'double';
      }

      if (settings.fontSize !== undefined || settings.lineHeight !== undefined || settings.fontTheme !== undefined || settings.paragraphSpacing !== undefined
          || settings.customFontFamily !== undefined || settings.customFontFaceCSS !== undefined) {
        const fontThemes = {
          default: { cjk: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif', serif: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif' },
          system: { cjk: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif', serif: '-apple-system, BlinkMacSystemFont, system-ui, sans-serif' },
          literata: { cjk: "'Noto Serif SC', 'Source Han Serif SC', serif", serif: "Literata, Georgia, serif" },
        };

        let fontFamily;
        if (currentCustomFontFamily) {
          fontFamily = currentCustomFontFamily;
        } else {
          const theme = fontThemes[currentFontTheme] || fontThemes.default;
          // For themes with multi-value font stacks (like system default), use as-is
          // For named font themes (like literata), wrap in quotes
          const needsQuotes = !theme.cjk.includes(',');
          if (needsQuotes) {
            fontFamily = "'" + theme.cjk + "', '" + theme.serif + "', serif";
          } else {
            fontFamily = theme.cjk;
          }
        }
        const fSize = currentFontSize;
        const lh = currentLineHeight;
        // paragraphSpacing/pageMargin are stored as px tuned at the
        // default 16px font size. Scale them with the actual font size so
        // spacing reads proportionally at large font sizes — without this
        // a 16px paragraphSpacing looks cramped at fontSize 64.
        // BASELINE matches defaultReadSettings.fontSize in core/stores/settings-store.ts.
        const BASELINE_FONT_SIZE = 16;
        const layoutScale = currentFontSize / BASELINE_FONT_SIZE;
        const ps = Math.round(currentParagraphSpacing * layoutScale);

        const baseStyles = `
          :root {
            --readany-font-family: ${fontFamily};
          }
          html, body {
            font-family: var(--readany-font-family) !important;
            font-size: ${fSize}px !important;
            -webkit-text-size-adjust: none;
          }
          body *:not(svg):not(svg *):not(code):not(pre):not(kbd):not(samp) {
            font-family: var(--readany-font-family) !important;
          }
          p, div, blockquote, li, span, h1, h2, h3, h4, h5, h6 {
            line-height: ${lh} !important;
          }
          pre, code, kbd, samp {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace !important;
          }
          p { margin-top: ${ps}px !important; margin-bottom: ${ps}px !important; }
          img, svg { max-width: 100% !important; height: auto !important; }
        `;
        lastRendererStyles = baseStyles;
        const themedStyles = injectThemeIntoStyles(
          baseStyles,
          currentThemeColors.bg,
          currentThemeColors.fg,
          currentThemeColors.primary,
        );
        renderer.setStyles(themedStyles);
        syncCustomFontStylesForAllDocs(currentCustomFontFaceCSS);
      }

      if (settings.pageMargin != null) {
        // Scale pageMargin with fontSize so the page edges stay
        // proportionally placed at large font sizes. Same baseline (16) as
        // the paragraphSpacing scaling above.
        const BASELINE_FONT_SIZE = 16;
        const layoutScale = currentFontSize / BASELINE_FONT_SIZE;
        const margin = Math.round(settings.pageMargin * layoutScale);
        const gapPercent = Math.max(1, Math.round((margin / 393) * 100));
        renderer.setAttribute('gap', gapPercent + '%');
        renderer.setAttribute('margin', margin + 'px');
      }

      if (view && view.isFixedLayout) {
        applyFixedLayoutRendererSettings(renderer, currentPaginatedLayout);
      }

      if (settings.viewMode) {
        currentViewMode = settings.viewMode;
        if (settings.viewMode === 'scroll') {
          renderer.setAttribute('flow', 'scrolled');
          renderer.setAttribute('max-inline-size', '9999px');
        } else {
          renderer.removeAttribute('flow');
          renderer.setAttribute('max-inline-size', '100%');
        }
      }
    }

    function splitCustomFontCSS(css) {
      const importUrls = [];
      const fontFaceLines = [];
      for (const line of (css || '').split('\n')) {
        const trimmed = line.trim();
        if (trimmed.startsWith('@import')) {
          const url = trimmed
            .replace(/^@import\s+url\(['"]?/, '')
            .replace(/['"]?\);?\s*$/, '')
            .trim();
          if (url) importUrls.push(url);
        } else {
          fontFaceLines.push(line);
        }
      }
      return {
        importUrls,
        fontFaceCSS: fontFaceLines.join('\n').trim(),
      };
    }

    function syncCustomFontStylesForDoc(doc, css) {
      if (!doc || !doc.head) return;
      const { importUrls, fontFaceCSS } = splitCustomFontCSS(css);

      doc.querySelectorAll('link.__readany_css_font__').forEach((el) => el.remove());
      for (const url of importUrls) {
        const link = doc.createElement('link');
        link.rel = 'stylesheet';
        link.href = url;
        link.className = '__readany_css_font__';
        doc.head.appendChild(link);
      }

      const styleId = '__readany_custom_font_face__';
      let el = doc.getElementById(styleId);
      if (!el) {
        el = doc.createElement('style');
        el.id = styleId;
        doc.head.appendChild(el);
      }
      el.textContent = fontFaceCSS;
    }

    function syncCustomFontStylesForAllDocs(css) {
      for (const content of getRendererContents()) {
        if (!content || !content.doc) continue;
        syncCustomFontStylesForDoc(content.doc, css);
      }
    }

    function injectCustomFontFace(css) {
      syncCustomFontStylesForDoc(document, css);
      syncCustomFontStylesForAllDocs(css);
    }

    function setThemeColors(colors) {
      const bg = colors.background || '#1c1c1e';
      const fg = colors.foreground || '#e8e8ed';
      const muted = colors.muted || '#7c7c82';
      const primary = colors.primary || '#3b82f6';

      currentThemeColors = { bg, fg, muted, primary };

      document.documentElement.style.setProperty('--bg', bg);
      document.documentElement.style.setProperty('--fg', fg);
      document.documentElement.style.setProperty('--muted', muted);
      document.documentElement.style.setProperty('--primary', primary);
      document.body.style.backgroundColor = bg;
      document.body.style.color = fg;

      if (view && view.renderer && view.renderer.setStyles) {
        const currentStyles = lastRendererStyles || '';
        const themedStyles = injectThemeIntoStyles(currentStyles, bg, fg, primary);
        view.renderer.setStyles(themedStyles);
      }

      if (view && view.setSearchIndicator) {
        view.setSearchIndicator('outline', { color: primary });
      }
    }

    function injectThemeIntoStyles(baseStyles, bg, fg, primary) {
      const cleaned = baseStyles.replace(
        /\/\* __theme_colors__ \*\/[\s\S]*?\/\* __end_theme_colors__ \*\//g,
        '',
      );
      const themeBlock = `/* __theme_colors__ */
html, body {
  background-color: ${bg} !important;
  color: ${fg} !important;
}
p, div, span, blockquote, li, dd, dt, h1, h2, h3, h4, h5, h6, td, th, caption, figcaption, label, a {
  color: inherit !important;
}
a { color: ${primary} !important; }
::selection { background: rgba(59, 130, 246, 0.3) !important; }
/* __end_theme_colors__ */`;
      return themeBlock + '\n' + cleaned;
    }

    // ─── Document styles ───
    function applyDocStyles(doc) {
      syncCustomFontStylesForDoc(doc, currentCustomFontFaceCSS);
      for (const img of doc.querySelectorAll('img')) {
        img.style.maxWidth = '100%';
        img.style.height = 'auto';
