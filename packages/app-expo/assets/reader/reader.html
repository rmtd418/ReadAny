          if (dragPoint && point.x >= viewportWidth - horizontalInset) return 'prev';
          if (inBottomBand && point.x <= viewportWidth * 0.74) return 'next';
          if (dragPoint && inBottomBand && point.x >= viewportWidth * 0.88) return 'prev';
        } else {
          if (point.x >= viewportWidth - horizontalInset) return 'next';
          if (dragPoint && point.x <= horizontalInset) return 'prev';
          if (inBottomBand && point.x >= viewportWidth * 0.26) return 'next';
          if (dragPoint && inBottomBand && point.x <= viewportWidth * 0.12) return 'prev';

      } catch {
        return null;
      }
    }

    function getPaginatedContainer() {

        if (!paginator || !paginator.shadowRoot) return null;
        return paginator.shadowRoot.querySelector('#container');
      } catch {
        return null;
      }
    }

    function getVisibleTextSnippet(maxLen) {
      maxLen = maxLen || 80;
      try {
        if (!view || !view.renderer) return '';
        var renderer = view.renderer;
        var contents = renderer.getContents && renderer.getContents();
        if (!contents || !contents[0] || !contents[0].doc) return '';
        var doc = contents[0].doc;
        var win = doc.defaultView;
        if (!win) return '';

        var texts = [];
        var totalLen = 0;

        // Check if we're in paginated mode (CSS columns)
        var isPaginated = !renderer.scrolled;
        var pSize = renderer.size;   // container visible width (one page)
        var pStart = renderer.start; // abs(scrollLeft)

        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
            if (isTTSFootnoteMarker(node.nodeValue)) return NodeFilter.FILTER_REJECT;
            if (shouldSkipTTSNode(node.parentElement)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        while (textNode && totalLen < maxLen) {
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, first page starts at scroll offset = pSize
            // So visible range in iframe coords is [start - size, end - size]
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            var t = normalizeTTSText(textNode.nodeValue);
            if (t) { texts.push(t); totalLen += t.length; }
          }
          textNode = walker.nextNode();
        }
        var result = normalizeTTSText(texts.join(' '));
        return result.length > maxLen ? result.slice(0, maxLen) : result;
      } catch (e) { return ''; }
    }

    // Get all visible text for TTS (no length limit)
    function doGetVisibleText() {
      try {
        if (!view || !view.renderer) {
          return { text: '', error: 'no view or renderer' };
        }
        var renderer = view.renderer;
        var contents = renderer.getContents && renderer.getContents();
        if (!contents || !contents[0] || !contents[0].doc) {
          return { text: '', error: 'no contents or doc' };
        }
        var doc = contents[0].doc;
        var win = doc.defaultView;
        if (!win) {
          return { text: '', error: 'no win' };
        }

        var texts = [];

        // Check if we're in paginated mode (CSS columns)
        var isPaginated = !renderer.scrolled;
        var pSize = renderer.size;   // container visible width (one page)
        var pStart = renderer.start; // abs(scrollLeft)

        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
            if (isTTSFootnoteMarker(node.nodeValue)) return NodeFilter.FILTER_REJECT;
            if (shouldSkipTTSNode(node.parentElement)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        var nodeCount = 0;
        var visibleCount = 0;
        var firstRectInfo = null;
        while (textNode) {
          nodeCount++;
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          if (nodeCount === 1) {
            firstRectInfo = { left: rect.left, right: rect.right, width: rect.width };
          }
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, the iframe is expanded to the full content width.
            // The outer container scrolls to show the current "page".
            // First page starts at scroll offset = pSize (page 0 is padding).
            // So visible range in iframe coords is [start - size, end - size].
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            visibleCount++;
            var t = normalizeTTSText(textNode.nodeValue);
            if (t) { texts.push(t); }
          }
          textNode = walker.nextNode();
        }
        
        var result = normalizeTTSText(texts.join(' '));
        return { 
          text: result, 
          debug: {
            isPaginated: isPaginated,
            pSize: pSize,
            pStart: pStart,
            nodeCount: nodeCount,
            visibleCount: visibleCount,
            firstRect: firstRectInfo
          }
        };
      } catch (e) { 
        return { text: '', error: String(e) };
      }
    }

    function getCurrentRendererContent() {
      const contents = getRendererContents();
      return contents[0] || null;
    }

    function anchorToRange(doc, anchor) {
      if (!doc || !anchor) return null;
      if (anchor instanceof Range) return anchor;
      if (!(anchor instanceof Node)) return null;
      try {
        const range = doc.createRange();
        if (anchor.nodeType === Node.TEXT_NODE) {
          range.selectNodeContents(anchor);
        } else {
          range.selectNode(anchor);
        }
        return range;
      } catch (e) {
        console.log('[ttsRange] failed to normalize anchor:', e);
        return null;
      }
    }

    function resolveRangeForCfi(cfi) {
      if (!view || !cfi || !view.resolveCFI) return null;
      const contents = getRendererContents();
      if (!contents.length) return null;

      try {
        const resolved = view.resolveCFI(cfi);
        if (!resolved) return null;

        if (resolved.index != null) {
          const direct = contents.find((content) => content.index === resolved.index && content.doc);
          if (direct?.doc && typeof resolved.anchor === 'function') {
            try {
              const range = anchorToRange(direct.doc, resolved.anchor(direct.doc));
              if (range) return { range, doc: direct.doc, index: direct.index ?? resolved.index };
            } catch {}
          }
        }

        if (typeof resolved.anchor === 'function') {
          for (const content of contents) {
            if (!content?.doc) continue;
            try {
              const range = anchorToRange(content.doc, resolved.anchor(content.doc));
              if (range) return { range, doc: content.doc, index: content.index ?? resolved.index ?? 0 };
            } catch {}
          }
        }
      } catch (e) {
        console.log('[ttsRange] failed to resolve CFI:', e);
      }

      return null;
    }

    function getPaginatedVisibleRangeCandidates(renderer) {
      const start = Number(renderer && renderer.start || 0);
      const end = Number(renderer && renderer.end || 0);
      const size = Number(renderer && renderer.size || 0);
      const candidates = [];

      if (Number.isFinite(start) && Number.isFinite(size) && size > 0) {
        candidates.push({ left: start - size, right: start, source: 'legacy-offset' });
        candidates.push({ left: start, right: start + size, source: 'size-fallback' });
      }

      if (Number.isFinite(start) && Number.isFinite(end) && end > start) {
        candidates.push({ left: start, right: end, source: 'renderer' });
      }

      return candidates.filter((candidate, index, list) => {
        return candidate.right > candidate.left &&
          list.findIndex((item) => item.left === candidate.left && item.right === candidate.right) === index;

    function rectIntersectsPaginatedRange(rect, range) {
      return rect.right > range.left && rect.left < range.right;
    }

    function scorePaginatedVisibleRange(doc, range) {
      if (!doc || !doc.body) return 0;
      const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
        acceptNode: function (node) {
          if (isInsideRubyAnnotation(node)) return NodeFilter.FILTER_REJECT;
          if (isTTSFootnoteMarker(node.nodeValue || '')) return NodeFilter.FILTER_REJECT;
          if (shouldSkipTTSNode(node.parentElement)) return NodeFilter.FILTER_REJECT;
          return node.nodeValue && normalizeTTSText(node.nodeValue)
            ? NodeFilter.FILTER_ACCEPT
            : NodeFilter.FILTER_SKIP;
        },
      });
      let score = 0;
      let visited = 0;
      let textNode = walker.nextNode();
      while (textNode && visited < 500) {
        visited += 1;
        const text = normalizeTTSText(textNode.nodeValue || '');
        if (text) {
          try {
            const textRange = doc.createRange();
            textRange.selectNodeContents(textNode);
            const rects = Array.from(textRange.getClientRects ? textRange.getClientRects() : []);
            if (rects.some((rect) => rect.width > 0 && rect.height > 0 && rectIntersectsPaginatedRange(rect, range))) {
              score += Math.min(text.length, 120);
            }
          } catch {}
        }
        textNode = walker.nextNode();
      }
      return score;
    }

    function pickPaginatedVisibleRange(doc, renderer) {
      const candidates = getPaginatedVisibleRangeCandidates(renderer);
      if (candidates.length <= 1) return candidates[0] || null;

      const legacyRange = candidates.find((range) => range.source === 'legacy-offset') || null;
      if (legacyRange && scorePaginatedVisibleRange(doc, legacyRange) > 0) return legacyRange;

      const rendererRange = candidates.find((range) => range.source === 'renderer') || null;
      if (rendererRange && scorePaginatedVisibleRange(doc, rendererRange) > 0) return rendererRange;

      const fallbackRange = candidates.find((range) => range.source === 'size-fallback') || null;
      if (fallbackRange && scorePaginatedVisibleRange(doc, fallbackRange) > 0) return fallbackRange;

      return legacyRange || rendererRange || fallbackRange || candidates[0] || null;
    }

    let ttsVisibleRangeByDoc = new WeakMap();

    function getVisibleRangeForTTSDoc(doc, renderer) {
      if (!doc) return null;
      if (ttsVisibleRangeByDoc.has(doc)) return ttsVisibleRangeByDoc.get(doc) || null;
      const range = pickPaginatedVisibleRange(doc, renderer);
      ttsVisibleRangeByDoc.set(doc, range);
      return range;
    }

    function getRangeDocument(range) {
      const container = range && range.commonAncestorContainer;
      if (!container) return null;
      return container.nodeType === Node.DOCUMENT_NODE ? container : container.ownerDocument;
    }

    function getReaderViewportRect() {
      const viewport = {
        left: 0,
        top: 0,
        right: window.innerWidth || document.documentElement.clientWidth || 0,
        bottom: window.innerHeight || document.documentElement.clientHeight || 0,
      };
      try {
        const viewRect = view && view.getBoundingClientRect ? view.getBoundingClientRect() : null;
        if (!viewRect || viewRect.width <= 0 || viewRect.height <= 0) return viewport;
        return {
          left: Math.max(viewRect.left, viewport.left),
          top: Math.max(viewRect.top, viewport.top),
          right: Math.min(viewRect.right, viewport.right),
          bottom: Math.min(viewRect.bottom, viewport.bottom),
        };
      } catch (e) {
        return viewport;
      }
    }

    function mapIframeRectToHost(rect, doc) {
      try {
        const iframe = doc && doc.defaultView && doc.defaultView.frameElement;
        if (!iframe || !iframe.getBoundingClientRect) return rect;
        const iframeRect = iframe.getBoundingClientRect();
        const scaleX = iframe.clientWidth > 0 ? iframeRect.width / iframe.clientWidth : 1;
        const scaleY = iframe.clientHeight > 0 ? iframeRect.height / iframe.clientHeight : 1;
        return {
          left: iframeRect.left + rect.left * scaleX,
          top: iframeRect.top + rect.top * scaleY,
          right: iframeRect.left + rect.right * scaleX,
          bottom: iframeRect.top + rect.bottom * scaleY,
          width: rect.width * scaleX,
          height: rect.height * scaleY,
        };
      } catch (e) {
        return rect;
      }
    }

    function isHostRectVisible(rect) {
      if (!rect || rect.width <= 0 || rect.height <= 0) return false;
      const viewport = getReaderViewportRect();
      return rect.right > viewport.left &&
        rect.left < viewport.right &&
        rect.bottom > viewport.top &&
        rect.top < viewport.bottom;

    function getContentHostRect(content) {
      const doc = content && content.doc;
      const iframe = doc && doc.defaultView && doc.defaultView.frameElement;
      if (iframe && iframe.getBoundingClientRect) {
        const rect = iframe.getBoundingClientRect();
        return {
          left: rect.left,
          top: rect.top,
          right: rect.right,
          bottom: rect.bottom,
          width: rect.width,
          height: rect.height,
        };
      }
      if (doc && doc.body) {
        return mapIframeRectToHost(doc.body.getBoundingClientRect(), doc);
      }
      return null;
    }

    function getVisibleContentsForTTS(contents, renderer) {
      if (!renderer || !renderer.scrolled) return contents;
      return (contents || [])
        .filter(function(content) { return !!(content && content.doc); })
        .map(function(content) {
          return { content: content, rect: getContentHostRect(content) };
        })
        .filter(function(item) {
          return item.rect && isHostRectVisible(item.rect);
        })
        .sort(function(a, b) {
          const topDelta = (a.rect ? a.rect.top : 0) - (b.rect ? b.rect.top : 0);
          return Math.abs(topDelta) > 1
            ? topDelta
            : (a.rect ? a.rect.left : 0) - (b.rect ? b.rect.left : 0);
        })
        .map(function(item) { return item.content; });

    function isRectVisibleInReader(rect, renderer, win, doc) {
      if (!rect || rect.width <= 0 || rect.height <= 0) return false;
      const isPaginated = !renderer.scrolled;
      if (isPaginated && renderer.size > 0) {
        const visibleRange = getVisibleRangeForTTSDoc(doc, renderer);
        return visibleRange ? rectIntersectsPaginatedRange(rect, visibleRange) : false;

    function isRangeVisibleInReader(range, renderer, win) {
      if (!range || !renderer || !win) return false;

    // ─── Chapter Extraction for Vectorization ───
    async function handleExtractChapters() {
      if (!currentBook) {
        postToRN('chaptersExtracted', { error: 'No book loaded' });
        return;
      }

      try {
        const sections = currentBook.sections || [];
        const toc = currentBook.toc || [];

        // Build map of href to title mapping
        const tocMap = new Map();
        function walkToc(items) {
          for (const item of items) {
            if (item.label) {
              tocMap.set(item.index, item.label);
              if (item.href) {
                const base = item.href.split("#")[0];
                tocMap.set(base, item.label);
                tocMap.set(item.href, item.label);
              }
            }
            if (item.subitems && item.subitems.length) {
              walkToc(item.subitems);
            }
          }
        }
        walkToc(toc);

        const chapters = [];

        for (let i = 0; i < sections.length; i++) {
          const section = sections[i];
          if (!section.createDocument) continue;

          try {
            const doc = await section.createDocument();
            if (!doc.body) continue;

            const title = tocMap.get(i) || tocMap.get(section.href || "") || `Section ${i + 1}`;
            const CFI = window.CFI || (window.EpubCFI && window.EpubCFI.fake ? window.EpubCFI : null);
            let baseCfi = section.cfi;

            // If CFI generation is available but no base cfi, try to fake it
            if (!baseCfi && typeof CFI?.fake?.fromIndex === 'function') {
              baseCfi = CFI.fake.fromIndex(i);
            } else if (!baseCfi) {
              baseCfi = `epubcfi(/6/${(i + 1) * 2}!)`; // Fallback approximate
            }

            const segments = extractSegmentsWithCfi(doc, baseCfi, CFI);
            if (segments.length === 0) continue;

            const content = segments.map(s => s.text).join("\\n\\n");
            chapters.push({ index: i, title, content, segments });

            // Reclaim memory
            doc.documentElement.innerHTML = "";
          } catch (err) {
            console.warn(`[WebView] Failed to extract section ${i}:`, err);
          }
        }

        postToRN('chaptersExtracted', { chapters });
      } catch (err) {
        console.error('[WebView] Error extracting chapters:', err);
        postToRN('chaptersExtracted', { error: String(err) });
      }
    }

    function extractSegmentsWithCfi(doc, baseCfi, CFI) {
      const segments = [];
      const body = doc.body;
      if (!body) return segments;

      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      const blocks = body.querySelectorAll(blockSelector);

      if (blocks.length === 0) {
        const text = body.textContent?.trim();
        if (text) {
          segments.push({ text, cfi: baseCfi });
        }
        return segments;
      }

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const text = extractBlockText(block);
        if (!text || text.length < 2) continue;

        try {
          if (!CFI) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const textNodes = getTextNodes(block);
          if (textNodes.length === 0) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const range = doc.createRange();
          const firstNode = textNodes[0];
          const lastNode = textNodes[textNodes.length - 1];

          range.setStart(firstNode, 0);
          range.setEnd(lastNode, lastNode.length);

          let rangeCfi = '';
          if (typeof CFI.fromRange === 'function') {
            rangeCfi = CFI.fromRange(range);
          } else if (CFI.Generator && typeof CFI.Generator.generateRangeComponent === 'function') {
            rangeCfi = CFI.Generator.generateRangeComponent(
              range.startContainer, range.startOffset,
              range.endContainer, range.endOffset
            );
          }

          let fullCfi = baseCfi;
          if (rangeCfi) {
            if (typeof CFI.joinIndir === 'function') {
              fullCfi = CFI.joinIndir(baseCfi, rangeCfi);
            } else {
              // naive join epubcfi(/a!) and epubcfi(/b) -> epubcfi(/a!/b)
              fullCfi = baseCfi.replace('!)', '!' + rangeCfi.replace('epubcfi(', ''));
            }
          }

          segments.push({ text, cfi: fullCfi });
        } catch (e) {
          segments.push({ text, cfi: baseCfi });
        }
      }
      return segments;
    }

    function getReaderLayoutSignature(doc) {
      var root = doc && doc.documentElement;
      var body = doc && doc.body;
      var renderer = view && view.renderer;
      return [
        root ? root.scrollWidth : 0,
        root ? root.scrollHeight : 0,
        body ? body.scrollWidth : 0,
        body ? body.scrollHeight : 0,
        renderer && typeof renderer.page !== 'undefined' ? renderer.page : '',
        renderer && typeof renderer.pages !== 'undefined' ? renderer.pages : ''
      ].join(':');

    function waitForReaderLayoutStable(doc) {
      return new Promise(function(resolve) {
        var win = (doc && doc.defaultView) || window;
        var requestFrame = win.requestAnimationFrame
          ? win.requestAnimationFrame.bind(win)
          : function(callback) { return setTimeout(function() { callback(Date.now()); }, 16); };
        var previous = getReaderLayoutSignature(doc);
        var stableFrames = 0;
        var frames = 0;

        function tick() {
          frames += 1;
          var next = getReaderLayoutSignature(doc);
          if (next === previous) {
            stableFrames += 1;
          } else {
            stableFrames = 0;
            previous = next;
          }

          if (stableFrames >= 2 || frames >= 12) {
            resolve();
            return;
          }

          requestFrame(tick);
        }

        requestFrame(tick);
      });
    }

    function isInsideRubyAnnotation(node) {
      var p = node.parentNode;
      while (p && p.nodeType === 1) {
        var name = p.tagName && p.tagName.toLowerCase();
        if (name === 'rt' || name === 'rp') return true;
        p = p.parentNode;
      }

    }

    function getTextNodes(element) {
      const walker = element.ownerDocument.createTreeWalker(
        element,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode: function (node) {
            if (isInsideRubyAnnotation(node)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          },
        }
      );
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) {
        if (node.textContent && node.textContent.trim()) {
          nodes.push(node);
        }
      }
      return nodes;
    }

    function getTTSTextNodes(element) {
      const walker = element.ownerDocument.createTreeWalker(
        element,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode: function (node) {
            if (isInsideRubyAnnotation(node)) return NodeFilter.FILTER_REJECT;
            if (isTTSFootnoteMarker(node.nodeValue || '')) return NodeFilter.FILTER_REJECT;
            if (shouldSkipTTSNode(node.parentElement)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          },
        }
      );
      const nodes = [];
      let node;
      while ((node = walker.nextNode())) {
        if (node.textContent && node.textContent.trim()) {
          nodes.push(node);
        }
      }
      return nodes;
    }

    function extractBlockText(block) {
      const walker = block.ownerDocument.createTreeWalker(
        block,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode: function (node) {
            if (isInsideRubyAnnotation(node)) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          },
        }
      );
      const texts = [];
      let node;
      while ((node = walker.nextNode())) {

        if (text) texts.push(text);

    // ─── Ruby Annotation (Pinyin/Zhuyin) ───
    var _rubyWordDict = null; // { "word": ["pinyin", freq] }
    var _rubyCharDict = null; // { "char": "pinyin" }
    var _rubyMode = null;     // "zh-pinyin" | "zh-zhuyin" | null

    var CJK_RE = /[一-鿿㐀-䶿豈-﫿]/;
    var RUBY_STYLE_ID = 'readany-ruby-style';
    var RUBY_PROCESSED_ATTR = 'data-ruby-processed';

    function rubyAnnotateChinese(text) {
      if ((!_rubyWordDict && !_rubyCharDict) || !text) return [{ char: text, reading: '', needsRuby: false }];
      var tokens = [];
      var i = 0;
      while (i < text.length) {
        var ch = text[i];
        if (!CJK_RE.test(ch)) {
          var j = i + 1;
          while (j < text.length && !CJK_RE.test(text[j])) j++;
          tokens.push({ char: text.slice(i, j), reading: '', needsRuby: false });
          i = j;
          continue;
        }
        var matched = false;
        if (_rubyWordDict) {
          for (var len = Math.min(4, text.length - i); len >= 2; len--) {
            var word = text.slice(i, i + len);
            var entry = _rubyWordDict[word];
            if (entry) {
              var reading = entry[0];
              var readings = reading.split(' ');
              if (readings.length === word.length) {
                for (var k = 0; k < word.length; k++) {
                  tokens.push({ char: word[k], reading: readings[k], needsRuby: true });
                }
              } else {
                tokens.push({ char: word, reading: reading, needsRuby: true });
              }
              i += len;
              matched = true;
              break;
            }
          }
        }
        if (matched) continue;
        var singleReading = '';
        if (_rubyWordDict && _rubyWordDict[ch]) {
          singleReading = _rubyWordDict[ch][0];
        } else if (_rubyCharDict && _rubyCharDict[ch]) {
          singleReading = _rubyCharDict[ch];
