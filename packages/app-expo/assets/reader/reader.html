            if (tag === 'rt' || tag === 'rp') return NodeFilter.FILTER_REJECT;
            if (parent && parent.closest && parent.closest('.readany-translation')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        while (textNode && totalLen < maxLen) {
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, first page starts at scroll offset = pSize
            // So visible range in iframe coords is [start - size, end - size]
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            var t = textNode.nodeValue.trim();
            if (t) { texts.push(t); totalLen += t.length; }
          }
          textNode = walker.nextNode();
        }
        var result = texts.join(' ').trim();
        return result.length > maxLen ? result.slice(0, maxLen) : result;
      } catch (e) { return ''; }
    }

    // Get all visible text for TTS (no length limit)
    function doGetVisibleText() {
      try {
        if (!view || !view.renderer) {
          return { text: '', error: 'no view or renderer' };
        }
        var renderer = view.renderer;
        var contents = renderer.getContents && renderer.getContents();
        if (!contents || !contents[0] || !contents[0].doc) {
          return { text: '', error: 'no contents or doc' };
        }
        var doc = contents[0].doc;
        var win = doc.defaultView;
        if (!win) {
          return { text: '', error: 'no win' };
        }

        var texts = [];

        // Check if we're in paginated mode (CSS columns)
        var isPaginated = !renderer.scrolled;
        var pSize = renderer.size;   // container visible width (one page)
        var pStart = renderer.start; // abs(scrollLeft)

        var walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT, {
          acceptNode: function(node) {
            if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_SKIP;
            var parent = node.parentElement;
            var tag = parent && parent.tagName && parent.tagName.toLowerCase();
            if (tag === 'script' || tag === 'style') return NodeFilter.FILTER_REJECT;
            if (tag === 'rt' || tag === 'rp') return NodeFilter.FILTER_REJECT;
            if (parent && parent.closest && parent.closest('.readany-translation')) return NodeFilter.FILTER_REJECT;
            return NodeFilter.FILTER_ACCEPT;
          }
        });

        var textNode = walker.nextNode();
        var nodeCount = 0;
        var visibleCount = 0;
        var firstRectInfo = null;
        while (textNode) {
          nodeCount++;
          var range = doc.createRange();
          range.selectNodeContents(textNode);
          var rect = range.getBoundingClientRect();
          
          if (nodeCount === 1) {
            firstRectInfo = { left: rect.left, right: rect.right, width: rect.width };
          }
          
          var isVisible = false;
          if (isPaginated && pSize > 0) {
            // In paginated mode, the iframe is expanded to the full content width.
            // The outer container scrolls to show the current "page".
            // First page starts at scroll offset = pSize (page 0 is padding).
            // So visible range in iframe coords is [start - size, end - size].
            var visibleLeft = pStart - pSize;
            var visibleRight = pStart;
            isVisible = rect.right > visibleLeft && rect.left < visibleRight && rect.width > 0;
          } else {
            // Scrolled mode: use iframe viewport dimensions
            var vw = win.innerWidth;
            var vh = win.innerHeight;
            isVisible = rect.width > 0 && rect.height > 0 &&
                rect.right > 0 && rect.left < vw &&
                rect.bottom > 0 && rect.top < vh;
          }
          
          if (isVisible) {
            visibleCount++;
            var t = textNode.nodeValue.trim();
            if (t) { texts.push(t); }
          }
          textNode = walker.nextNode();
        }
        
        var result = texts.join(' ').trim();
        return { 
          text: result, 
          debug: {
            isPaginated: isPaginated,
            pSize: pSize,
            pStart: pStart,
            nodeCount: nodeCount,
            visibleCount: visibleCount,
            firstRect: firstRectInfo
          }
        };
      } catch (e) { 
        return { text: '', error: String(e) };
      }
    }

    function getCurrentRendererContent() {
      const contents = getRendererContents();
      return contents[0] || null;
    }

    function anchorToRange(doc, anchor) {
      if (!doc || !anchor) return null;
      if (anchor instanceof Range) return anchor;
      if (!(anchor instanceof Node)) return null;
      try {
        const range = doc.createRange();
        if (anchor.nodeType === Node.TEXT_NODE) {
          range.selectNodeContents(anchor);
        } else {
          range.selectNode(anchor);
        }
        return range;
      } catch (e) {
        console.log('[ttsRange] failed to normalize anchor:', e);
        return null;
      }
    }

    function resolveRangeForCfi(cfi) {
      if (!view || !cfi || !view.resolveCFI) return null;
      const contents = getRendererContents();
      if (!contents.length) return null;

      try {
        const resolved = view.resolveCFI(cfi);
        if (!resolved) return null;

        if (resolved.index != null) {
          const direct = contents.find((content) => content.index === resolved.index && content.doc);
          if (direct?.doc && typeof resolved.anchor === 'function') {
            try {
              const range = anchorToRange(direct.doc, resolved.anchor(direct.doc));
              if (range) return { range, doc: direct.doc, index: direct.index ?? resolved.index };
            } catch {}
          }
        }

        if (typeof resolved.anchor === 'function') {
          for (const content of contents) {
            if (!content?.doc) continue;
            try {
              const range = anchorToRange(content.doc, resolved.anchor(content.doc));
              if (range) return { range, doc: content.doc, index: content.index ?? resolved.index ?? 0 };
            } catch {}
          }
        }
      } catch (e) {
        console.log('[ttsRange] failed to resolve CFI:', e);
      }

      return null;
    }

    function isRectVisibleInReader(rect, renderer, win) {
      if (!rect || rect.width <= 0 || rect.height <= 0) return false;
      const isPaginated = !renderer.scrolled;
      if (isPaginated && renderer.size > 0) {
        const visibleLeft = renderer.start - renderer.size;
        const visibleRight = renderer.start;
        return rect.right > visibleLeft && rect.left < visibleRight;
      }
      return rect.right > 0 && rect.left < win.innerWidth && rect.bottom > 0 && rect.top < win.innerHeight;
    }

    function isRangeVisibleInReader(range, renderer, win) {
      if (!range || !renderer || !win) return false;
      try {
        const rects = Array.from(range.getClientRects ? range.getClientRects() : []);
        if (!rects.length) {
          return isRectVisibleInReader(range.getBoundingClientRect(), renderer, win);
        }
        return rects.some((rect) => isRectVisibleInReader(rect, renderer, win));
      } catch (e) {
        console.log('[visibleTTSSegments] failed to inspect range rects:', e);
        return false;
      }
    }

    function isRangeStartVisibleInReader(range, renderer, win) {
      if (!range || !renderer || !win) return false;
      try {
        const rects = Array.from(range.getClientRects ? range.getClientRects() : []);
        if (!rects.length) {
          return isRectVisibleInReader(range.getBoundingClientRect(), renderer, win);
        }
        return isRectVisibleInReader(rects[0], renderer, win);
      } catch (e) {
        console.log('[visibleTTSSegments] failed to inspect range start rect:', e);
        return false;
      }
    }

    function getVisibleBlocksForTTS(doc, renderer) {
      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      const blocks = doc.querySelectorAll(blockSelector);
      const win = doc.defaultView;
      if (!win) return [];
      return Array.from(blocks).filter((block) => {
        if (!block || !block.textContent || !block.textContent.trim()) return false;
        if (block.closest && block.closest('.readany-translation')) return false;
        try {
          const range = doc.createRange();
          range.selectNodeContents(block);
          return isRangeVisibleInReader(range, renderer, win);
        } catch (e) {
          return isRectVisibleInReader(block.getBoundingClientRect(), renderer, win);
        }
      });
    }

    function getReadableBlocksForTTS(doc) {
      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      return Array.from(doc.querySelectorAll(blockSelector)).filter((block) => {
        if (!block || !block.textContent || !block.textContent.trim()) return false;
        if (block.closest && block.closest('.readany-translation')) return false;
        return true;
      });
    }

    function resolveTextPosition(textNodes, absoluteOffset, isEnd) {
      if (!textNodes.length) return null;
      for (var i = 0; i < textNodes.length; i++) {
        var item = textNodes[i];
        if (absoluteOffset < item.end || (isEnd && absoluteOffset <= item.end)) {
          return {
            node: item.node,
            offset: Math.max(0, Math.min(item.node.nodeValue.length, absoluteOffset - item.start)),
          };
        }
      }
      const last = textNodes[textNodes.length - 1];
      return { node: last.node, offset: last.node.nodeValue.length };
    }

    function fallbackSentenceSegments(text) {
      const normalized = (text || '').replace(/\s+/g, ' ').trim();
      if (!normalized) return [];
      const matches = normalized.match(/[^。！？!?；;\n]+[。！？!?；;…]?/gu) || [];
      return (matches.length ? matches : [normalized]).map((segment) => segment.trim()).filter(Boolean);
    }

    function stripCfiAssertions(value) {
      return String(value || '').replace(/\[[^\]]*\]/g, '');
    }

    function getTTSCfiStartIdentity(cfi) {
      const raw = String(cfi || '').trim();
      if (!raw) return '';
      const inner = raw.startsWith('epubcfi(') && raw.endsWith(')')
        ? raw.slice(8, -1)
        : raw;
      const bangIndex = inner.indexOf('!');
      if (bangIndex < 0) return stripCfiAssertions(inner);

      const sectionPath = stripCfiAssertions(inner.slice(0, bangIndex));
      const localPath = stripCfiAssertions(inner.slice(bangIndex + 1));
      const commaIndex = localPath.indexOf(',');
      if (commaIndex < 0) return `${sectionPath}!${localPath}`;

      const commonPath = localPath.slice(0, commaIndex);
      const rangePath = localPath.slice(commaIndex + 1);
      const rangeEndIndex = rangePath.indexOf(',');
      const startPath = rangeEndIndex >= 0 ? rangePath.slice(0, rangeEndIndex) : rangePath;
      return `${sectionPath}!${commonPath}${startPath}`;
    }

    function getTTSSegmentIdentity(cfi, text) {
      return `${getTTSCfiStartIdentity(cfi)}::${String(text || '').replace(/\s+/g, ' ').trim()}`;
    }

    function summarizeTTSSegmentsForLog(segments, limit) {
      return (segments || []).slice(0, limit || 8).map(function(segment, index) {
        var text = String(segment && segment.text || '').replace(/\s+/g, ' ').trim();
        return {
          index: index,
          cfi: segment && segment.cfi || null,
          length: text.length,
          text: text,
        };
      });
    }

    function collectTTSSegmentsFromEngine(count, alignCfi, alignRange) {
      const tts = view && view.tts;
      if (!tts) return [];

      // Prefer range-based alignment (reliable boundary comparison) over CFI string
      // matching (fragile — depends on exact serialization equality).
      if (alignRange && typeof tts.from === 'function') {
        try {
          // tts.from() uses `range.end <= detailRange.start` comparison.
          // If we pass a full sentence range, range.end overshoots detailRange[0].start
          // and skips the first sentence. Collapse to start (caret) so the comparison
          // correctly lands on the sentence that CONTAINS the visible position.
          const caretRange = alignRange.cloneRange ? alignRange.cloneRange() : alignRange;
          if (caretRange.collapse) caretRange.collapse(true); // collapse to start
          tts.from(caretRange);
        } catch (e) {
          console.log('[visibleTTSSegments] tts.from() failed, falling back to alignCfi:', e);
          // fall through to CFI alignment below
          if (alignCfi && typeof tts.alignCfi === 'function') {
            try { tts.alignCfi(alignCfi); } catch {}
          }
        }
      } else if (alignCfi) {
        try {
          if (typeof tts.alignCfi === 'function') {
            tts.alignCfi(alignCfi);
          } else if (typeof tts.highlightCfi === 'function') {
            tts.highlightCfi(alignCfi);
          }
        } catch (e) {
          console.log('[visibleTTSSegments] failed to align tts detail cursor:', e);
        }
      }

      const total = Math.max(1, Number.isFinite(count) ? count : 1);
      const current =
        typeof tts.currentDetail === 'function'
          ? tts.currentDetail()
          : null;
      const following =
        typeof tts.collectDetails === 'function'
          ? tts.collectDetails(Math.max(0, total - (current ? 1 : 0)), {
              includeCurrent: false,
              offset: 1,
            })
          : [];

      const result = [];
      const seen = new Set();
      for (const detail of [current, ...(following || [])]) {
        if (!detail || !detail.text || !detail.cfi) continue;
        const text = String(detail.text).replace(/\s+/g, ' ').trim();
        const identity = getTTSSegmentIdentity(detail.cfi, text);
        if (!text || seen.has(identity)) continue;
        seen.add(identity);
        result.push({ text, cfi: detail.cfi });
      }
      return result;
    }

    function getTTSSegmentContextFromEngine(cfi, beforeCount, afterCount) {
      try {
        const tts = view && view.tts;
        if (!tts || !cfi) return { before: [], after: [] };

        const resolved = resolveRangeForCfi(cfi);
        try {
          if (resolved?.range && typeof tts.from === 'function') {
            const caretRange = resolved.range.cloneRange ? resolved.range.cloneRange() : resolved.range;
            if (caretRange.collapse) caretRange.collapse(true);
            tts.from(caretRange);
          } else if (typeof tts.alignCfi === 'function') {
            tts.alignCfi(cfi);
          } else if (typeof tts.highlightCfi === 'function') {
            tts.highlightCfi(cfi);
          }
        } catch (e) {
          console.log('[ttsSegmentContext] failed to align cfi:', e);
          return { before: [], after: [] };
        }

        const current =
          typeof tts.currentDetail === 'function'
            ? tts.currentDetail()
            : null;
        const currentText =
          current && current.text
            ? String(current.text).replace(/\s+/g, ' ').trim()
            : '';
        const currentIdentity = currentText ? getTTSSegmentIdentity(current && current.cfi, currentText) : null;

        const normalize = function(details) {
          const result = [];
          const seen = new Set();
          for (const detail of details || []) {
            if (!detail || !detail.text || !detail.cfi) continue;
            const text = String(detail.text).replace(/\s+/g, ' ').trim();
            const identity = getTTSSegmentIdentity(detail.cfi, text);
            if (!text || (currentIdentity && identity === currentIdentity) || seen.has(identity)) continue;
            seen.add(identity);
            result.push({ text, cfi: detail.cfi });
          }
          return result;
        };

        const before =
          typeof tts.collectDetails === 'function'
            ? tts.collectDetails(Math.max(0, beforeCount || 0), {
                includeCurrent: false,
                offset: -Math.max(0, beforeCount || 0),
              })
            : [];
        const after =
          typeof tts.collectDetails === 'function'
            ? tts.collectDetails(Math.max(0, afterCount || 0), {
                includeCurrent: false,
                offset: 1,
              })
            : [];

        return {
          before: normalize(before),
          after: normalize(after),
        };
      } catch (e) {
        console.log('[ttsSegmentContext] error:', e);
        return { before: [], after: [] };
      }
    }

    function extractTTSSegmentsFromDocument(doc, sectionIndex, maxCount, anchorRange) {
      try {
        if (!doc || !view || typeof view.getCFI !== 'function') return [];
        const blocks = getReadableBlocksForTTS(doc);
        const lang =
          doc.documentElement.lang ||
          doc.documentElement.getAttribute('xml:lang') ||
          (doc.body && doc.body.lang) ||
          navigator.language ||
          'en';
        const segmenter =
          typeof Intl !== 'undefined' && Intl.Segmenter
            ? new Intl.Segmenter(lang, { granularity: 'sentence' })
            : null;
        const limit = Math.max(1, maxCount || 24);
        const segments = [];
        const seen = new Set();
        const docNode = doc.defaultView && doc.defaultView.Node ? doc.defaultView.Node : Node;
        const anchorNode =
          anchorRange && anchorRange.startContainer
            ? (anchorRange.startContainer.nodeType === docNode.TEXT_NODE
                ? anchorRange.startContainer.parentElement
                : anchorRange.startContainer)
            : null;
        let started = !anchorNode;

        for (const block of blocks) {
          if (!started && anchorNode) {
            if (block === anchorNode || block.contains(anchorNode)) {
              started = true;
            } else if (
              anchorNode.compareDocumentPosition &&
              (anchorNode.compareDocumentPosition(block) & docNode.DOCUMENT_POSITION_FOLLOWING)
            ) {
              started = true;
            }
          }
          if (!started) continue;

          const textNodes = getTextNodes(block).map((node) => {
            const text = node.nodeValue || '';
            return { node, text };
          }).filter((item) => item.text.trim().length > 0);
          if (!textNodes.length) continue;

          let absoluteText = '';
          const positionedNodes = textNodes.map((item) => {
            const start = absoluteText.length;
            absoluteText += item.text;
            return {
              node: item.node,
              start,
              end: absoluteText.length,
            };
          });

          const rawSegments = segmenter
            ? Array.from(segmenter.segment(absoluteText)).map((item) => ({
                start: item.index,
                end: item.index + item.segment.length,
              }))
            : fallbackSentenceSegments(absoluteText).reduce((acc, sentence) => {
                const start = absoluteText.indexOf(sentence, acc.lastIndex || 0);
                if (start >= 0) {
                  acc.items.push({ start, end: start + sentence.length });
                  acc.lastIndex = start + sentence.length;
                }
                return acc;
              }, { items: [], lastIndex: 0 }).items;
          const normalizedSegments = rawSegments.length
            ? rawSegments
            : [{ start: 0, end: absoluteText.length }];

          for (const rawSegment of normalizedSegments) {
            let start = rawSegment.start;
            let end = rawSegment.end;
            while (start < end && /\s/u.test(absoluteText[start])) start++;
            while (end > start && /\s/u.test(absoluteText[end - 1])) end--;
            if (end - start < 2) continue;

            const startPos = resolveTextPosition(positionedNodes, start, false);
            const endPos = resolveTextPosition(positionedNodes, end, true);
            if (!startPos || !endPos) continue;

            const range = doc.createRange();
            range.setStart(startPos.node, startPos.offset);
            range.setEnd(endPos.node, endPos.offset);

            const text = absoluteText.slice(start, end).replace(/\s+/g, ' ').trim();
            if (!text) continue;

            try {
              const cfi = view.getCFI(sectionIndex, range);
              const identity = getTTSSegmentIdentity(cfi, text);
              if (!cfi || seen.has(identity)) continue;
              seen.add(identity);
              segments.push({ text, cfi });
              if (segments.length >= limit) return segments;
            } catch (e) {
              console.log('[hrefTTSSegments] failed to convert range to CFI:', e);
            }
          }
        }

        return segments;
      } catch (e) {
        console.log('[hrefTTSSegments] extract error:', e);
        return [];
      }
    }

    async function getHrefTTSSegmentsFromBook(href, maxCount) {
      try {
        if (!href || !currentBook || !currentBook.sections || !view) return [];
        let resolved = null;
        try {
          if (typeof view.resolveNavigation === 'function') {
            resolved = await Promise.resolve(view.resolveNavigation(href));
          } else if (typeof currentBook.resolveHref === 'function') {
            resolved = await Promise.resolve(currentBook.resolveHref(href));
          }
        } catch (e) {
          console.log('[hrefTTSSegments] failed to resolve href:', href, e);
        }

        let sectionIndex = Number.isInteger(resolved && resolved.index) ? resolved.index : -1;
        if (sectionIndex < 0) {
          const hrefWithoutHash = String(href).split('#')[0];
          sectionIndex = Array.from(currentBook.sections).findIndex(function(section) {
            const sectionHref = String(section && section.href || '').split('#')[0];
            return sectionHref === href || sectionHref === hrefWithoutHash || sectionHref.endsWith('/' + hrefWithoutHash);
          });
        }
        if (sectionIndex < 0 || sectionIndex >= currentBook.sections.length) return [];
        const section = currentBook.sections[sectionIndex];
        if (!section || typeof section.createDocument !== 'function') return [];

        const doc = await section.createDocument();
        let anchorRange = null;
        if (resolved && typeof resolved.anchor === 'function') {
          try {
            anchorRange = anchorToRange(doc, resolved.anchor(doc));
          } catch (e) {
            anchorRange = null;
          }
        }

        return extractTTSSegmentsFromDocument(doc, sectionIndex, maxCount, anchorRange);
      } catch (e) {
        console.log('[hrefTTSSegments] error:', e);
        return [];
      }
    }

    async function getSectionTTSSegmentsFromBook(sectionIndex, maxCount) {
      try {
        if (!currentBook || !currentBook.sections || !view) return [];
        const index = Number(sectionIndex);
        if (!Number.isInteger(index) || index < 0 || index >= currentBook.sections.length) {
          return [];
        }

        const section = currentBook.sections[index];
        if (!section || typeof section.createDocument !== 'function') return [];

        const doc = await section.createDocument();
        return extractTTSSegmentsFromDocument(doc, index, maxCount, null);
      } catch (e) {
        console.log('[sectionTTSSegments] error:', e);
        return [];
      }
    }

    function extractVisibleTTSSegments(alignCfi) {
      try {
        const renderer = view && view.renderer;
        const contents = getRendererContents();
        if (!renderer || !contents.length) return [];
        const segments = [];
        const stats = {
          contentsCount: contents.length,
          visibleBlockCount: 0,
          rawSentenceCount: 0,
          skippedTooShort: 0,
          skippedNoBoundary: 0,
          skippedNotStartVisible: 0,
          skippedNotVisible: 0,
          skippedEmptyText: 0,
          skippedCFI: 0,
          skippedDuplicate: 0,
          startVisibilityMode: 'range-intersection',
        };
        const seenVisibleIdentities = new Set();
        // Track the first visible range for range-based TTS cursor alignment
        // Must be declared here (outer scope) so it's accessible after both loops close.
        let firstVisibleRange = null;

        for (var contentIndex = 0; contentIndex < contents.length; contentIndex++) {
          const current = contents[contentIndex];
          if (!current || !current.doc) continue;
          const doc = current.doc;
          const win = doc.defaultView;
          if (!win) continue;
          const sectionIndex = typeof current.index === 'number' ? current.index : currentSectionIndex;
          const visibleBlocks = getVisibleBlocksForTTS(doc, renderer);
          stats.visibleBlockCount += visibleBlocks.length;
          const lang =
            doc.documentElement.lang ||
            doc.documentElement.getAttribute('xml:lang') ||
            doc.body.lang ||
            navigator.language ||
            'en';
          const segmenter =
            typeof Intl !== 'undefined' && Intl.Segmenter
              ? new Intl.Segmenter(lang, { granularity: 'sentence' })
              : null;

          for (var blockIndex = 0; blockIndex < visibleBlocks.length; blockIndex++) {
            const block = visibleBlocks[blockIndex];
            const textNodes = getTextNodes(block).map((node) => {
              const text = node.nodeValue || '';
              return { node, text };
            }).filter((item) => item.text.trim().length > 0);
            if (!textNodes.length) continue;

            var absoluteText = '';
            const positionedNodes = textNodes.map((item) => {
              const start = absoluteText.length;
              absoluteText += item.text;
              return {
                node: item.node,
                start,
                end: absoluteText.length,
              };
            });

            const rawSegments = segmenter
              ? Array.from(segmenter.segment(absoluteText)).map((item) => ({
                  start: item.index,
                  end: item.index + item.segment.length,
                }))
              : fallbackSentenceSegments(absoluteText).reduce((acc, sentence) => {
                  const start = absoluteText.indexOf(sentence, acc.lastIndex || 0);
                  if (start >= 0) {
                    acc.items.push({ start, end: start + sentence.length });
                    acc.lastIndex = start + sentence.length;
                  }
                  return acc;
                }, { items: [], lastIndex: 0 }).items;

            const normalizedSegments = rawSegments.length
              ? rawSegments

    // ─── Chapter Extraction for Vectorization ───
    async function handleExtractChapters() {
      if (!currentBook) {
        postToRN('chaptersExtracted', { error: 'No book loaded' });
        return;
      }

      try {
        const sections = currentBook.sections || [];
        const toc = currentBook.toc || [];

        // Build map of href to title mapping
        const tocMap = new Map();
        function walkToc(items) {
          for (const item of items) {
            if (item.label) {
              tocMap.set(item.index, item.label);
              if (item.href) {
                const base = item.href.split("#")[0];
                tocMap.set(base, item.label);
                tocMap.set(item.href, item.label);
              }
            }
            if (item.subitems && item.subitems.length) {
              walkToc(item.subitems);
            }
          }
        }
        walkToc(toc);

        const chapters = [];

        for (let i = 0; i < sections.length; i++) {
          const section = sections[i];
          if (!section.createDocument) continue;

          try {
            const doc = await section.createDocument();
            if (!doc.body) continue;

            const title = tocMap.get(i) || tocMap.get(section.href || "") || `Section ${i + 1}`;
            const CFI = window.CFI || (window.EpubCFI && window.EpubCFI.fake ? window.EpubCFI : null);
            let baseCfi = section.cfi;

            // If CFI generation is available but no base cfi, try to fake it
            if (!baseCfi && typeof CFI?.fake?.fromIndex === 'function') {
              baseCfi = CFI.fake.fromIndex(i);
            } else if (!baseCfi) {
              baseCfi = `epubcfi(/6/${(i + 1) * 2}!)`; // Fallback approximate
            }

            const segments = extractSegmentsWithCfi(doc, baseCfi, CFI);
            if (segments.length === 0) continue;

            const content = segments.map(s => s.text).join("\\n\\n");
            chapters.push({ index: i, title, content, segments });

            // Reclaim memory
            doc.documentElement.innerHTML = "";
          } catch (err) {
            console.warn(`[WebView] Failed to extract section ${i}:`, err);
          }
        }

        postToRN('chaptersExtracted', { chapters });
      } catch (err) {
        console.error('[WebView] Error extracting chapters:', err);
        postToRN('chaptersExtracted', { error: String(err) });
      }
    }

    function extractSegmentsWithCfi(doc, baseCfi, CFI) {
      const segments = [];
      const body = doc.body;
      if (!body) return segments;

      const blockSelector = "p, h1, h2, h3, h4, h5, h6, li, blockquote, dd, dt, figcaption, pre, td, th";
      const blocks = body.querySelectorAll(blockSelector);

      if (blocks.length === 0) {
        const text = body.textContent?.trim();
        if (text) {
          segments.push({ text, cfi: baseCfi });
        }
        return segments;
      }

      for (let i = 0; i < blocks.length; i++) {
        const block = blocks[i];
        const text = extractBlockText(block);
        if (!text || text.length < 2) continue;

        try {
          if (!CFI) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const textNodes = getTextNodes(block);
          if (textNodes.length === 0) {
            segments.push({ text, cfi: baseCfi });
            continue;
          }

          const range = doc.createRange();
          const firstNode = textNodes[0];
          const lastNode = textNodes[textNodes.length - 1];

          range.setStart(firstNode, 0);
          range.setEnd(lastNode, lastNode.length);

          let rangeCfi = '';
          if (typeof CFI.fromRange === 'function') {
            rangeCfi = CFI.fromRange(range);
          } else if (CFI.Generator && typeof CFI.Generator.generateRangeComponent === 'function') {
            rangeCfi = CFI.Generator.generateRangeComponent(
              range.startContainer, range.startOffset,
              range.endContainer, range.endOffset
            );
          }

          let fullCfi = baseCfi;
          if (rangeCfi) {
            if (typeof CFI.joinIndir === 'function') {
              fullCfi = CFI.joinIndir(baseCfi, rangeCfi);
            } else {
              // naive join epubcfi(/a!) and epubcfi(/b) -> epubcfi(/a!/b)
              fullCfi = baseCfi.replace('!)', '!' + rangeCfi.replace('epubcfi(', ''));
            }
          }

          segments.push({ text, cfi: fullCfi });
        } catch (e) {
          segments.push({ text, cfi: baseCfi });
        }
      }
      return segments;
    }
